<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Ekora Bazaar</title>
  <rect width="512" height="512" fill="#ffffff"/>

  <!--
    EB MONOGRAM — Pure vector geometry. No fonts. No text. No images.
    Design: Interlocking E (left) + B (right) sharing a central vertical spine.

    Canvas: 512×512
    Color: #111111 on #ffffff

    Geometry:
      y_top  = 96   (top of mark)
      y_mid  = 256  (vertical center of canvas)
      y_bot  = 416  (bottom of mark)
      Mark height = 320px

      x_left  = 141  (E left stem outer edge)
      x_bar_r = 291  (right edge of E bars + spine = left edge of B bumps)
      x_right = 371  (rightmost point of B bumps, 291+80)
      Mark width = 230px
      Mark horizontal center = 141 + 115 = 256 ✓

    E elements:
      - Left vertical stem:  x=141, y=96,  w=60,  h=320
      - Top horizontal bar:  x=141, y=96,  w=150, h=70
      - Middle bar (short):  x=141, y=221, w=130, h=70
      - Bottom bar:          x=141, y=346, w=150, h=70
      - Shared right spine:  x=231, y=96,  w=60,  h=320

    B elements (right half-disks sharing x=291 as flat edge):
      - Upper bump: center (291, 176), radius 80  → M291,96  A80,80 0 0,1 291,256 Z
      - Lower bump: center (291, 336), radius 80  → M291,256 A80,80 0 0,1 291,416 Z

    Bar spacing: bar_h=70, gap=55  (3×70 + 2×55 = 320 ✓)
    Gaps are equal → perfectly symmetrical E
  -->

  <!-- E: left vertical stem -->
  <rect x="141" y="96" width="60" height="320" fill="#111111"/>

  <!-- E: top horizontal bar -->
  <rect x="141" y="96" width="150" height="70" fill="#111111"/>

  <!-- E: middle bar (shorter — classic E proportion) -->
  <rect x="141" y="221" width="130" height="70" fill="#111111"/>

  <!-- E: bottom horizontal bar -->
  <rect x="141" y="346" width="150" height="70" fill="#111111"/>

  <!-- Shared central spine (right side of E, left side of B) -->
  <rect x="231" y="96" width="60" height="320" fill="#111111"/>

  <!-- B: upper right half-disk (center 291,176 radius 80) -->
  <!-- sweep-flag=1 → clockwise → arc goes RIGHT from top to mid → right-facing D shape -->
  <path d="M 291,96 A 80,80 0 0,1 291,256 Z" fill="#111111"/>

  <!-- B: lower right half-disk (center 291,336 radius 80) -->
  <path d="M 291,256 A 80,80 0 0,1 291,416 Z" fill="#111111"/>

</svg>