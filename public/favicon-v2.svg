<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Ekora Bazaar Favicon</title>
  
  <!-- 1. Pure White Background -->
  <rect width="512" height="512" fill="#ffffff" />

  <!-- 2. Very Thin Luxury Gold Ring (Center 256,256; r=240; stroke=16 -> 0.5px at 16x16) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#C5A059" stroke-width="16" />

  <defs>
    <!-- Mask for B: cuts out white separation gaps where E's Top and Bottom arms pass OVER B's spine -->
    <mask id="mask-B-spine">
      <rect width="512" height="512" fill="white" />
      <!-- Cutout for E top arm (y: 96..160 with 16px vertical gap padding) across B spine (x: 208..272) -->
      <rect x="194" y="80" width="92" height="96" fill="black" />
      <!-- Cutout for E bottom arm (y: 352..416 with 16px vertical gap padding) across B spine (x: 208..272) -->
      <rect x="194" y="336" width="92" height="96" fill="black" />
    </mask>

    <!-- Mask for E Middle Arm: cuts out white separation gap where B's spine passes OVER E's middle arm -->
    <mask id="mask-E-middle">
      <rect width="512" height="512" fill="white" />
      <!-- Cutout around B spine (x: 208..272 with 16px horizontal gap padding) across E middle arm -->
      <rect x="192" y="212" width="96" height="88" fill="black" />
    </mask>
  </defs>

  <!-- LETTER B (Spine masked where E top/bottom arms cross in front; Bowls solid black) -->
  <g fill="#111111">
    <!-- B Vertical Spine (x: 208 to 272, y: 96 to 416) masked -->
    <rect x="208" y="96" width="64" height="320" mask="url(#mask-B-spine)" />

    <!-- Upper Right Bowl (Outer: (272,96)->(416,96)->(416,240)->(272,240); Inner cutout hole: (272,160)->(352,160)->(352,192)->(272,192)) -->
    <path d="M 272,96 L 360,96 C 395,96 416,115 416,168 C 416,221 395,240 360,240 L 272,240 L 272,192 L 352,192 C 362,192 368,185 368,168 C 368,151 362,160 352,160 L 272,160 Z" />

    <!-- Lower Right Bowl (Outer: (272,240)->(432,240)->(432,416)->(272,416); Inner cutout hole: (272,304)->(368,304)->(368,352)->(272,352)) -->
    <path d="M 272,240 L 372,240 C 412,240 432,265 432,328 C 432,391 412,416 372,416 L 272,416 L 272,352 L 368,352 C 378,352 384,345 384,328 C 384,311 378,304 368,304 L 272,304 Z" />
  </g>

  <!-- LETTER E (Stem, Top Arm, Bottom Arm sit OVER B; Middle Arm masked under B spine) -->
  <g fill="#111111">
    <!-- E Vertical Stem (x: 80 to 144, y: 96 to 416) -->
    <rect x="80" y="96" width="64" height="320" />

    <!-- E Top Arm (x: 144 to 304, y: 96 to 160) -->
    <rect x="144" y="96" width="160" height="64" />

    <!-- E Bottom Arm (x: 144 to 304, y: 352 to 416) -->
    <rect x="144" y="352" width="160" height="64" />

    <!-- E Middle Arm (x: 144 to 320, y: 224 to 288) masked under B spine -->
    <rect x="144" y="224" width="176" height="64" mask="url(#mask-E-middle)" />
  </g>

</svg>